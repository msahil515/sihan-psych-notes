<!DOCTYPE html>
<html lang="en"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Psych Notes — MET Prep</title>
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#f3efe6">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<script>try{var _t=localStorage.getItem('pn-theme')||'light';document.documentElement.setAttribute('data-theme',_t);}catch(e){document.documentElement.setAttribute('data-theme','light');}</script>
<style>
*{box-sizing:border-box}
:root{
  --side-w:360px; --radius:14px;
  --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  --serif:Georgia,"Iowan Old Style","Palatino Linotype","Times New Roman",serif;
  --mono:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;
}
/* ---- warm paper (light, default) ---- */
html[data-theme="light"]{
  --bg:#f3efe6; --bg2:#ece7db; --panel:#fbf9f3; --panel2:#f1ece1;
  --ink:#272a31; --ink2:#454a55; --muted:#797f8c; --faint:#aab0bc;
  --line:#e4ddce; --line2:#d8d0bf;
  --head:#2b2f3a; --ink-strong:#14161b;
  --input-bg:#fffdf7; --hover:#ece5d6; --row-alt:rgba(60,40,10,.035); --toast-bg:#fffdf7; --on-accent:#fff;
  --accent:#3d6fd0; --accent-soft:rgba(61,111,208,.12); --accent-line:rgba(61,111,208,.34);
  --shadow:0 16px 34px rgba(70,58,32,.14);
  --logo-grad:linear-gradient(135deg,#3d6fd0,#7c5ce6);
  --body-grad:radial-gradient(1100px 650px at 85% -10%,#efe8d8 0,var(--bg) 55%);
}
/* ---- warm dark ---- */
html[data-theme="dark"]{
  --bg:#14161c; --bg2:#171a21; --panel:#1b1e27; --panel2:#21252f;
  --ink:#ece9e3; --ink2:#c7cad3; --muted:#8d93a1; --faint:#5f6573;
  --line:#2a2e3a; --line2:#353a47;
  --head:#e3e9ff; --ink-strong:#ffffff;
  --input-bg:#0f1116; --hover:#242936; --row-alt:rgba(255,255,255,.02); --toast-bg:#1b1e27; --on-accent:#14161c;
  --accent:#5b9cff; --accent-soft:rgba(91,156,255,.16); --accent-line:rgba(91,156,255,.42);
  --shadow:0 16px 34px rgba(0,0,0,.45);
  --logo-grad:linear-gradient(135deg,#5b9cff,#a78bfa);
  --body-grad:radial-gradient(1200px 700px at 85% -10%,#1c2230 0,var(--bg) 55%);
}
html,body{margin:0;height:100%;background:var(--bg);color:var(--ink);
  font:16px/1.65 var(--sans);
  -webkit-text-size-adjust:100%;-webkit-font-smoothing:antialiased}
body{background:var(--body-grad)}
#app{display:flex;height:100%}
::selection{background:var(--accent-soft)}

/* ---- top bar (mobile) ---- */
#topbar{display:none;align-items:center;gap:10px;height:54px;padding:0 12px;
  background:color-mix(in srgb,var(--bg2) 92%,transparent);backdrop-filter:blur(10px);
  border-bottom:1px solid var(--line);position:sticky;top:0;z-index:30}
#menu{flex:none;width:40px;height:40px;border:1px solid var(--line2);border-radius:11px;
  background:var(--panel2);color:var(--ink);font-size:18px;line-height:1;cursor:pointer;display:flex;align-items:center;justify-content:center}
#menu:active{background:var(--hover)}
#topbar .topsearch{position:relative;flex:1;min-width:0}
#topbar .topsearch svg{position:absolute;left:12px;top:50%;transform:translateY(-50%);opacity:.55;pointer-events:none}
#q2{width:100%;height:40px;padding:0 12px 0 36px;border-radius:11px;border:1px solid var(--line2);
  background:var(--input-bg);color:var(--ink);font-size:15px;outline:none;transition:border-color .15s,box-shadow .15s}
#q2:focus{border-color:var(--accent-line);box-shadow:0 0 0 3px var(--accent-soft)}

/* ---- sidebar ---- */
#side{width:var(--side-w);flex:none;background:linear-gradient(180deg,var(--panel) 0,var(--bg2) 100%);
  border-right:1px solid var(--line);overflow-y:auto;padding:20px 16px 40px;-webkit-overflow-scrolling:touch}
.brand{display:flex;align-items:center;gap:11px;margin:2px 6px 16px}
.brand .logo{width:38px;height:38px;border-radius:11px;flex:none;display:flex;align-items:center;justify-content:center;
  font-size:21px;color:#fff;background:var(--logo-grad);box-shadow:0 5px 16px rgba(61,111,208,.32)}
.brand .bn{font-size:16px;font-weight:750;letter-spacing:.01em}
.brand .bs{font-size:11.5px;color:var(--muted);font-weight:500;letter-spacing:.03em;text-transform:uppercase}
.brand .acts{margin-left:auto;display:flex;align-items:center;gap:7px}
.search{position:relative;margin:0 2px 14px}
.search svg{position:absolute;left:13px;top:50%;transform:translateY(-50%);opacity:.5}
#q{width:100%;padding:12px 14px 12px 40px;border-radius:12px;border:1px solid var(--line2);
  background:var(--input-bg);color:var(--ink);font-size:15px;outline:none;transition:border-color .15s,box-shadow .15s}
#q:focus{border-color:var(--accent-line);box-shadow:0 0 0 3px var(--accent-soft)}

/* ---- sidebar collapse (desktop only — mobile uses the slide-in drawer below) ---- */
#sidetoggle{flex:none;width:30px;height:30px;border:1px solid var(--line2);border-radius:9px;
  background:var(--panel2);color:var(--muted);font-size:15px;line-height:1;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.14s}
#sidetoggle:hover{color:var(--ink);border-color:var(--faint)}
#reopen{display:none}
@media(min-width:901px){
  #side{transition:margin-left .24s cubic-bezier(.4,0,.2,1)}
  body.side-collapsed #side{margin-left:calc(-1 * var(--side-w))}
  #reopen{position:fixed;top:14px;left:14px;width:40px;height:40px;z-index:28;
    border:1px solid var(--line2);border-radius:11px;background:var(--panel2);color:var(--ink);
    font-size:18px;line-height:1;cursor:pointer;align-items:center;justify-content:center;
    box-shadow:var(--shadow);opacity:0;pointer-events:none;transform:translateX(-6px);transition:.18s}
  #reopen:hover{background:var(--hover)}
  body.side-collapsed #reopen{display:flex;opacity:1;pointer-events:auto;transform:none}
}

/* book filter pills */
.pills{display:flex;flex-wrap:wrap;gap:7px;margin:0 2px 8px}
.pill{flex:none;padding:7px 12px;border-radius:999px;border:1px solid var(--line2);background:transparent;
  color:var(--ink2);font-size:13px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:7px;transition:.14s}
.pill .dot{width:8px;height:8px;border-radius:50%;background:currentColor;opacity:.85}
.pill:hover{border-color:var(--faint)}
.pill.on{color:var(--ink-strong);border-color:var(--bk,var(--accent-line));background:var(--bk-soft,var(--accent-soft));box-shadow:inset 0 0 0 1px var(--bk,transparent)}

/* nav */
#nav{margin-top:4px}
.bkgroup{margin-top:16px}
.bkhead{display:flex;align-items:center;gap:9px;padding:6px 8px;margin-bottom:2px}
.bkhead .bk-ic{width:26px;height:26px;border-radius:8px;flex:none;display:flex;align-items:center;justify-content:center;font-size:14px;background:var(--bk-soft);border:1px solid var(--bk-line)}
.bkhead .bk-nm{font-size:12px;font-weight:750;letter-spacing:.06em;text-transform:uppercase;color:var(--bk)}
.bkhead .bk-ct{margin-left:auto;font-size:11px;color:var(--faint);font-variant-numeric:tabular-nums}
.ch{display:flex;align-items:flex-start;gap:10px;padding:9px 10px;border-radius:10px;color:var(--ink2);
  text-decoration:none;cursor:pointer;font-size:14px;line-height:1.45;position:relative}
.ch .nm{flex:none;min-width:22px;height:22px;padding:0 5px;border-radius:7px;font-size:11.5px;font-weight:700;
  display:flex;align-items:center;justify-content:center;background:var(--panel2);color:var(--muted);
  border:1px solid var(--line2);font-variant-numeric:tabular-nums;margin-top:1px}
.ch:hover{background:var(--hover);color:var(--ink)}
.ch.active{background:var(--bk-soft);color:var(--ink-strong)}
.ch.active .nm{background:var(--bk);color:var(--on-accent);border-color:var(--bk)}
.ch.active::before{content:"";position:absolute;left:-16px;top:6px;bottom:6px;width:3px;border-radius:0 3px 3px 0;background:var(--bk)}
.ch .bdg{margin-left:auto;flex:none;font-size:10px;font-weight:700;letter-spacing:.04em;color:var(--bk);
  background:var(--bk-soft);border:1px solid var(--bk-line);border-radius:6px;padding:1px 6px;align-self:center}
.noresult{color:var(--muted);font-size:13.5px;text-align:center;padding:30px 10px}

/* ---- main ---- */
#main{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;position:relative}
#progress{position:sticky;top:0;left:0;height:3px;width:100%;z-index:15;background:transparent}
#progress>i{display:block;height:100%;width:0;background:linear-gradient(90deg,var(--bk,var(--accent)),#a78bfa);transition:width .08s linear}
.wrap{max-width:820px;margin:0 auto;padding:38px 52px 96px}

/* home */
.home .hero{margin:16px 0 30px}
.home .hero h1{font-family:var(--serif);font-size:33px;font-weight:700;margin:0 0 10px;letter-spacing:-.01em;color:var(--ink-strong)}
.home .hero p{color:var(--muted);font-size:15px;margin:0;max-width:560px;line-height:1.6}
.cards{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}
.card{text-align:left;border:1px solid var(--line2);border-radius:var(--radius);padding:18px;cursor:pointer;
  background:linear-gradient(165deg,var(--panel2),var(--panel));position:relative;overflow:hidden;transition:.16s;color:inherit}
.card::after{content:"";position:absolute;inset:0;border-radius:var(--radius);box-shadow:inset 0 1px 0 rgba(255,255,255,.05);pointer-events:none}
.card:hover{transform:translateY(-2px);border-color:var(--bk-line);box-shadow:var(--shadow)}
.card .ic{width:46px;height:46px;border-radius:13px;display:flex;align-items:center;justify-content:center;font-size:24px;
  background:var(--bk-soft);border:1px solid var(--bk-line);margin-bottom:14px}
.card .ttl{font-size:17px;font-weight:750;margin:0 0 3px;letter-spacing:.01em}
.card .ed{font-size:12.5px;color:var(--muted);margin:0 0 14px;line-height:1.4}
.card .meta{display:flex;align-items:center;gap:8px;font-size:12.5px;color:var(--bk);font-weight:650}
.card .meta .bar{flex:1;height:4px;border-radius:3px;background:var(--line2);overflow:hidden}
.card .meta .bar>i{display:block;height:100%;width:100%;background:var(--bk);opacity:.55}

/* book index (chapter grid inside main) */
.bkindex{margin-top:6px}
.bkindex .ihead{display:flex;align-items:center;gap:13px;margin:8px 0 20px}
.bkindex .ihead .ic{width:50px;height:50px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:26px;background:var(--bk-soft);border:1px solid var(--bk-line);flex:none}
.bkindex .ihead h2{font-family:var(--serif);margin:0;font-size:23px;font-weight:700}
.bkindex .ihead .sub{color:var(--muted);font-size:13px}
.ilist{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.icell{display:flex;align-items:center;gap:12px;padding:13px 15px;border:1px solid var(--line2);border-radius:12px;
  cursor:pointer;background:var(--panel);transition:.14s;color:var(--ink2)}
.icell:hover{border-color:var(--bk-line);background:var(--panel2);color:var(--ink-strong);transform:translateX(2px)}
.icell .n{flex:none;width:30px;height:30px;border-radius:9px;display:flex;align-items:center;justify-content:center;
  font-size:13px;font-weight:750;background:var(--bk-soft);color:var(--bk);border:1px solid var(--bk-line);font-variant-numeric:tabular-nums}
.icell .t{font-size:14px;line-height:1.35}

/* reader */
.crumb{display:flex;align-items:center;gap:9px;font-family:var(--sans);font-size:12.5px;font-weight:650;color:var(--bk);
  letter-spacing:.04em;text-transform:uppercase;margin-bottom:14px}
.crumb .bk-ic{width:22px;height:22px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:12px;background:var(--bk-soft);border:1px solid var(--bk-line)}
.crumb .sep{color:var(--faint)}
.reader{font-family:var(--serif);font-size:17.5px;line-height:1.8;color:var(--ink2)}
.reader h1{font-family:var(--serif);font-size:30px;font-weight:700;line-height:1.22;letter-spacing:-.012em;color:var(--ink-strong);margin:0 0 8px;padding-bottom:18px;border-bottom:1px solid var(--line)}
.reader h2{font-family:var(--serif);font-size:22px;font-weight:700;margin:40px 0 12px;color:var(--head);scroll-margin-top:70px}
.reader h3{font-family:var(--serif);font-size:18px;font-weight:700;margin:26px 0 8px;color:var(--ink)}
.reader p{margin:15px 0;color:var(--ink2)}
.reader strong{color:var(--ink-strong);font-weight:700}
.reader ul,.reader ol{padding-left:24px;color:var(--ink2)}
.reader li{margin:8px 0}
.reader a{color:var(--bk)}
.reader code{font-family:var(--mono);background:var(--panel2);border:1px solid var(--line2);padding:1px 6px;border-radius:6px;font-size:14px}
.reader table{border-collapse:collapse;width:100%;margin:20px 0;font-size:15px;display:block;overflow-x:auto}
.reader th,.reader td{border:1px solid var(--line2);padding:10px 13px;text-align:left;vertical-align:top}
.reader th{font-family:var(--sans);background:var(--panel2);color:var(--ink-strong);font-weight:700;position:sticky;top:0}
.reader tr:nth-child(even) td{background:var(--row-alt)}
.reader blockquote{margin:16px 0;padding:10px 18px;border-left:3px solid var(--bk);background:var(--bk-soft);border-radius:0 8px 8px 0;color:var(--ink2)}
.reader hr{border:0;border-top:1px solid var(--line);margin:30px 0}

/* diagrams */
.reader .fig{margin:24px 0;padding:16px 16px 6px;background:var(--panel);border:1px solid var(--line2);border-radius:12px}
.reader .fig svg{display:block;width:100%;height:auto;max-width:560px;margin:0 auto}
.reader .fig a.figzoom{display:block;cursor:zoom-in}
.reader .fig img{display:block;width:100%;height:auto;max-width:560px;margin:0 auto;border-radius:8px;background:#fff}
.reader .fig .cap{font-family:var(--sans);margin:12px 2px 8px;font-size:13px;line-height:1.55;color:var(--muted);text-align:center}
.reader .fig .cap b{color:var(--ink2);font-weight:680}

/* prev / next */
.pn{display:flex;gap:12px;margin-top:46px;padding-top:24px;border-top:1px solid var(--line);font-family:var(--sans)}
.pn a{flex:1;display:flex;flex-direction:column;gap:3px;padding:13px 16px;border:1px solid var(--line2);border-radius:12px;
  cursor:pointer;text-decoration:none;background:var(--panel);transition:.14s;min-width:0}
.pn a:hover{border-color:var(--bk-line);background:var(--panel2)}
.pn a.next{text-align:right;align-items:flex-end}
.pn .lab{font-size:11px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--muted)}
.pn .pt{font-size:13.5px;color:var(--ink);font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%}
.pn a.empty{visibility:hidden}

/* ---- on-this-page outline (wide / landscape) ---- */
.toc{display:none}
@media(min-width:1180px){
  .reader.has-toc{display:grid;grid-template-columns:minmax(0,1fr) 232px;gap:52px;max-width:1240px;align-items:start}
  .reader.has-toc>.art{min-width:0;max-width:860px;width:100%;justify-self:start}
  .has-toc .toc{display:block;position:sticky;top:30px;align-self:start;max-height:calc(100vh - 64px);
    overflow-y:auto;border-left:1px solid var(--line);padding:2px 0 2px 18px;-webkit-overflow-scrolling:touch;font-family:var(--sans)}
  .toc .toc-h{font-size:11px;font-weight:750;letter-spacing:.08em;text-transform:uppercase;color:var(--faint);margin:0 0 12px}
  .toc a{display:block;font-size:13px;line-height:1.4;color:var(--muted);text-decoration:none;
    padding:6px 0 6px 16px;margin-left:-18px;border-left:2px solid transparent;transition:color .12s,border-color .12s}
  .toc a:hover{color:var(--ink)}
  .toc a.on{color:var(--bk);border-left-color:var(--bk);font-weight:600}
}
/* let the reader breathe more on very wide landscape */
@media(min-width:1500px){
  .reader.has-toc{max-width:1340px;gap:64px}
  .reader.has-toc>.art{max-width:920px}
  .reader .fig svg,.reader .fig img{max-width:640px}
}
@media(max-width:900px){
  #app{display:block;height:100%}
  #topbar{display:flex}
  #side .search{display:none}
  #sidetoggle{display:none}
  #main{height:calc(100% - 54px)}
  .wrap{padding:24px 20px 84px}
  .cards{grid-template-columns:1fr}
  .ilist{grid-template-columns:1fr}
  #side{position:fixed;top:0;left:0;height:100%;width:min(88vw,var(--side-w));z-index:25;
    transform:translateX(-100%);transition:transform .24s cubic-bezier(.4,0,.2,1);box-shadow:0 0 40px rgba(0,0,0,.4)}
  body.nav-open #side{transform:translateX(0)}
  #overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:20;backdrop-filter:blur(2px)}
  body.nav-open #overlay{display:block}
}
@media(max-width:900px){.home .hero h1{font-size:27px}.reader h1{font-size:25px}.reader{font-size:17px}}

/* ---- icon buttons (sync + theme) ---- */
.syncbtn,.themebtn{flex:none;width:40px;height:40px;border:1px solid var(--line2);border-radius:11px;
  background:var(--panel2);color:var(--ink2);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.14s}
.syncbtn:hover,.themebtn:hover{color:var(--ink);border-color:var(--faint)}
.syncbtn:active,.themebtn:active{background:var(--hover)}
.syncbtn svg,.themebtn svg{display:block}
.syncbtn.spin svg{animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.brand .syncbtn,.brand .themebtn{width:30px;height:30px;border-radius:9px;color:var(--muted)}
.brand .syncbtn svg,.brand .themebtn svg{width:15px;height:15px}
/* sun in dark mode (tap -> light), moon in light mode (tap -> dark) */
.themebtn .sun,.themebtn .moon{display:none}
html[data-theme="dark"] .themebtn .sun{display:block}
html[data-theme="light"] .themebtn .moon{display:block}

/* ---- toast ---- */
#toast{position:fixed;left:50%;bottom:26px;transform:translate(-50%,16px);z-index:60;
  background:var(--toast-bg);border:1px solid var(--accent-line);color:var(--ink);
  padding:11px 16px;border-radius:12px;font-size:13.5px;font-weight:600;
  box-shadow:var(--shadow);opacity:0;pointer-events:none;
  transition:opacity .22s,transform .22s;display:flex;align-items:center;gap:9px;max-width:88vw}
#toast.show{opacity:1;transform:translate(-50%,0)}
#toast .dot{width:8px;height:8px;border-radius:50%;background:var(--accent);flex:none;box-shadow:0 0 8px var(--accent)}
#toast b{color:var(--ink-strong);font-weight:700}

/* ===== tablet tuning (Galaxy Tab S6 ~ 1280x800 / 800x1280 css px) ===== */
/* landscape: trim the wide sidebar so the reader isn't squeezed, bump the type
   for the 10.5" high-dpi screen, and give nav rows bigger tap targets. */
@media (min-width:901px) and (max-width:1366px) and (orientation:landscape){
  :root{--side-w:304px}
  .wrap{padding:34px 46px 96px}
  .reader{font-size:18.5px;line-height:1.82}
  .reader h1{font-size:31px}
  .reader h2{font-size:23px}
  .reader h3{font-size:18.5px}
  .ch{padding:11px 11px}
  .ch .nm{min-width:24px;height:24px}
  .icell{padding:15px 16px}
}
/* portrait: uses the hamburger shell, but the screen is far wider than a phone,
   so cap the reading column for sane line length and enlarge the type. */
@media (min-width:601px) and (max-width:900px){
  .wrap{padding:32px 28px 92px;max-width:700px;margin:0 auto}
  .reader{font-size:18.5px;line-height:1.82}
  .reader h1{font-size:28px}
  .reader h2{font-size:22px}
  .cards{grid-template-columns:1fr 1fr}
  .ilist{grid-template-columns:1fr 1fr}
}

/* ===== wide / landscape reading surface (tablet landscape + desktop) =====
   On a roomy screen the article becomes a contained sheet of paper floating
   on the warm desk, with a chapter masthead tinted to the book's accent, so
   the landscape Tab S6 reads like a real document instead of text stretched
   across an empty background. Phones / portrait keep the plain flow above. */
@media(min-width:1180px){
  .reader .art{
    background:var(--panel);border:1px solid var(--line);border-radius:18px;
    padding:42px 52px 46px;box-shadow:var(--shadow);position:relative;overflow:hidden;
  }
  /* thin accent ribbon along the top edge, tinted to the current book */
  .reader .art::before{content:"";position:absolute;left:0;right:0;top:0;height:3px;
    background:linear-gradient(90deg,var(--bk),color-mix(in srgb,var(--bk) 20%,transparent) 80%)}
  /* masthead: kicker breadcrumb, title, then a short accent rule */
  .reader .art>.crumb{margin-bottom:11px}
  .reader .art>h1{border-bottom:none;padding-bottom:0;margin-bottom:24px}
  .reader .art>h1::after{content:"";display:block;width:52px;height:3px;border-radius:3px;
    background:var(--bk);opacity:.9;margin-top:17px}
  /* nested surfaces sit one step deeper so they read as insets, not blend-ins */
  .reader .art .fig{background:var(--panel2)}
  .reader .art .pn a{background:var(--panel2)}
  .reader .art .pn a:hover{background:var(--hover)}
  /* outline rail: tighter, with a soft header */

@media (min-width:1180px) and (max-width:1366px) and (orientation:landscape){

/* ---- glossary popover: tap a bolded jargon term -> short definition ---- */
/* highlight the bolded terms we have a definition for, so it's discoverable */
.reader strong.gloss{
  cursor:help;
  background-image:linear-gradient(transparent 0,transparent calc(100% - 2px),var(--bk,var(--accent)) calc(100% - 2px),var(--bk,var(--accent)) 100%);

}

/* the floating popover itself */

#glosspop .gp-x{flex:none;width:24px;height:24px;border:1px solid var(--line2);border-radius:7px;background:var(--panel2);color:var(--muted);font-size:14px;line-height:1;cursor:pointer;display:flex;align-items:center;justify-content:center;margin-top:-1px}
#glosspop .gp-x:hover{color:var(--ink);border-color:var(--faint)}

@media(max-width:600px){
  #glosspop{max-width:calc(100vw - 24px);left:12px !important;right:12px !important;width:auto}
}

<script>
const DATA = __PAYLOAD__;
// ---- per-book visual identity (keyed by book.key); c=dark accent, cl=light accent ----
const THEME={
  "schultz-personality":{c:"167,139,250",cl:"124,93,230",ic:"🧩"},
  "baron-social-psychology":{c:"45,212,191",cl:"13,148,136",ic:"👥"},
  "pinel-biopsychology":{c:"251,191,114",cl:"176,116,18",ic:"🧠"}
};
const FALLBACK={c:"91,156,255",cl:"61,111,208",ic:"📘"};
const meta=k=>THEME[k]||FALLBACK;
const curTheme=()=>document.documentElement.getAttribute('data-theme')||'light';
function bookVars(k){const m=meta(k);const c=curTheme()==='light'?m.cl:m.c;return `--bk:rgb(${c});--bk-soft:rgba(${c},.13);--bk-line:rgba(${c},.42)`;}
function edition(b){const m=(b.title||"").match(/\(([^)]+)\)/);return m?m[1]:"";}
function cleanTitle(t){return t.replace(/^(Chapter|Ch)?\s*\d+\s*[:.—-]?\s*/i,"").trim();}

const view=document.getElementById('view'), nav=document.getElementById('nav'),
      q=document.getElementById('q'), q2=document.getElementById('q2'), pills=document.getElementById('pills'),
      main=document.getElementById('main'), tt=document.getElementById('tt'),
      progress=document.querySelector('#progress>i');
const setTitle=t=>{if(tt)tt.textContent=t;};
const menu=document.getElementById('menu'), overlay=document.getElementById('overlay');
let activeBook="all", current=null;

function openNav(){document.body.classList.add('nav-open');}
function closeNav(){document.body.classList.remove('nav-open');}
menu.onclick=()=>document.body.classList.toggle('nav-open');
overlay.onclick=closeNav;

// ---- theme toggle (light <-> dark) ----
function applyTheme(t){
  document.documentElement.setAttribute('data-theme',t);
  try{localStorage.setItem('pn-theme',t);}catch(e){}
  const mc=document.querySelector('meta[name="theme-color"]');
  if(mc)mc.setAttribute('content',t==='light'?'#f3efe6':'#14161c');
  // re-apply theme-aware book accents without losing reading position
  buildPills();renderNav();
  if(current)view.setAttribute('style',bookVars(current.book));
  else renderHome();
}
function toggleTheme(){applyTheme(curTheme()==='light'?'dark':'light');}
document.querySelectorAll('.themebtn').forEach(b=>b.onclick=toggleTheme);

// ---- sidebar collapse (desktop) ----
const sidetoggle=document.getElementById('sidetoggle'), reopen=document.getElementById('reopen');
function setCollapsed(v){document.body.classList.toggle('side-collapsed',v);try{localStorage.setItem('sideCollapsed',v?'1':'0');}catch(e){}}
if(sidetoggle)sidetoggle.onclick=()=>setCollapsed(true);
if(reopen)reopen.onclick=()=>setCollapsed(false);
try{if(localStorage.getItem('sideCollapsed')==='1')document.body.classList.add('side-collapsed');}catch(e){}

// ---- filter pills ----
function buildPills(){
  pills.innerHTML='';
  const mk=(key,label)=>{
    const b=document.createElement('button');b.className='pill'+(activeBook===key?' on':'');
    if(key!=='all') b.setAttribute('style',bookVars(key));
    b.innerHTML=(key==='all'?'':'<span class="dot"></span>')+label;
    b.onclick=()=>{activeBook=key;current=null;q.value='';q2.value='';buildPills();renderNav();renderHome();closeNav();};
    pills.appendChild(b);
  };
  mk('all','All');
  DATA.books.forEach(b=>mk(b.key,b.subject));
}

// ---- sidebar nav ----
function renderNav(){
  const term=q.value.trim().toLowerCase();
  nav.innerHTML='';
  let shown=0;
  DATA.books.forEach(bk=>{
    if(!term && activeBook!=='all' && activeBook!==bk.key) return;
    let docs=DATA.docs.filter(d=>d.book===bk.key);
    if(term) docs=docs.filter(d=>d.title.toLowerCase().includes(term)||d.text.includes(term));
    if(!docs.length) return;
    shown+=docs.length;
    const m=meta(bk.key);
    const g=document.createElement('div');g.className='bkgroup';g.setAttribute('style',bookVars(bk.key));
    const h=document.createElement('div');h.className='bkhead';
    h.innerHTML=`<span class="bk-ic">${m.ic}</span><span class="bk-nm">${bk.subject}</span><span class="bk-ct">${docs.length}</span>`;
    g.appendChild(h);
    docs.forEach(d=>{
      const a=document.createElement('a');a.className='ch'+(current&&current===d?' active':'');
      a.innerHTML=`<span class="nm">${d.num}</span><span>${cleanTitle(d.title)}</span>`;
      a.onclick=()=>openDoc(d);
      g.appendChild(a);
    });
    nav.appendChild(g);
  });
  if(!shown) nav.innerHTML='<div class="noresult">No chapters match “'+term.replace(/</g,'')+'”.</div>';
}

// ---- home / book index ----
function renderHome(){
  current=null;setTitle('Psych Notes');main.scrollTop=0;progress.style.width='0';
  if(activeBook==='all'){
    let cards='';
    DATA.books.forEach(b=>{
      const m=meta(b.key),n=DATA.docs.filter(d=>d.book===b.key).length;
      cards+=`<button class="card" style="${bookVars(b.key)}" data-book="${b.key}">
        <div class="ic">${m.ic}</div>
        <div class="ttl">${b.subject}</div>
        <div class="ed">${edition(b)}</div>
        <div class="meta"><span>${n} chapters</span><span class="bar"><i></i></span></div>
      </button>`;
    });
    view.className='wrap home';view.removeAttribute('style');
    view.innerHTML=`<div class="hero"><h1>Three textbooks, one tap away.</h1>
      <p>Granular chapter notes for the MET 2026 Clinical Psych entrance. Pick a book to see its chapters, or search every page at once. Works fully offline.</p></div>
      <div class="cards">${cards}</div>`;
    view.querySelectorAll('.card').forEach(c=>c.onclick=()=>{
      activeBook=c.dataset.book;buildPills();renderNav();renderHome();
    });
  } else {
    const b=DATA.books.find(x=>x.key===activeBook),m=meta(activeBook);
    const docs=DATA.docs.filter(d=>d.book===activeBook);
    let cells='';
    docs.forEach(d=>{cells+=`<div class="icell" data-num="${d.num}"><span class="n">${d.num}</span><span class="t">${cleanTitle(d.title)}</span></div>`;});
    view.className='wrap';view.setAttribute('style',bookVars(activeBook));
    view.innerHTML=`<div class="bkindex"><div class="ihead"><div class="ic">${m.ic}</div>
      <div><h2>${b.subject}</h2><div class="sub">${b.title}</div></div></div>
      <div class="ilist">${cells}</div></div>`;
    view.querySelectorAll('.icell').forEach(c=>c.onclick=()=>{
      const d=docs.find(x=>String(x.num)===c.dataset.num);if(d)openDoc(d);
    });
  }
}

// ---- reader ----
function openDoc(d){
  current=d;activeBook=d.book;buildPills();
  const m=meta(d.book);
  const sib=DATA.docs.filter(x=>x.book===d.book);
  const i=sib.indexOf(d),prev=sib[i-1],next=sib[i+1];
  const pn=(item,cls,lab)=>item
    ? `<a class="${cls}" data-num="${item.num}"><span class="lab">${lab}</span><span class="pt">${cleanTitle(item.title)}</span></a>`
    : `<a class="${cls} empty"></a>`;
  view.className='wrap reader';view.setAttribute('style',bookVars(d.book));
  view.innerHTML=`<article class="art"><div class="crumb"><span class="bk-ic">${m.ic}</span>${d.subject}<span class="sep">›</span>Ch ${d.num}</div>`
    +'<h1>'+cleanTitle(d.title)+'</h1>'+d.html
    +`<nav class="pn">${pn(prev,'prev','‹ Previous')}${pn(next,'next','Next ›')}</nav></article>`
    +`<aside class="toc" id="toc"></aside>`;
  view.querySelectorAll('.pn a[data-num]').forEach(a=>a.onclick=()=>{
    const t=sib.find(x=>String(x.num)===a.dataset.num);if(t)openDoc(t);
  });
  buildTOC();
  decorateGlossary();
  setTitle(cleanTitle(d.title));
  main.scrollTop=0;progress.style.width='0';
  renderNav();closeNav();
}

// ---- glossary popover ---------------------------------------------------
// auto-pick the hard / technical bolded terms on the rendered chapter and
// make them tap-to-define. closes on outside click or Esc.
const GLOSS=(DATA&&DATA.gloss)||{};
function glossNormalize(s){
  return (s||'')
    .replace(/ /g,' ')
    .replace(/[‘’']/g,"'")
    .replace(/[:.;,!?—–-]+\s*$/,'')   // trailing colon, period, em/en dash, hyphen
    .replace(/^[\s—–-]+/,'')          // leading dashes
    .replace(/\s+/g,' ')
    .trim()
    .toLowerCase();
}
function glossLookup(raw){
  if(!raw) return null;
  const k=glossNormalize(raw);
  if(!k) return null;
  if(GLOSS[k]) return {key:k,def:GLOSS[k]};
  // simple plural rollback: "fibers" -> "fiber", "areas" -> "area"
  if(k.endsWith('s') && GLOSS[k.slice(0,-1)]) return {key:k.slice(0,-1),def:GLOSS[k.slice(0,-1)]};
  if(k.endsWith('ies') && GLOSS[k.slice(0,-3)+'y']) return {key:k.slice(0,-3)+'y',def:GLOSS[k.slice(0,-3)+'y']};
  // also try the head before " vs. " or " (" (e.g. "Premotor vs. SMA", "Supplementary motor area (SMA)")
  const head=k.split(/\s+\(|\s+vs\.?\s+/)[0].trim();
  if(head!==k && GLOSS[head]) return {key:head,def:GLOSS[head]};
  return null;
}
// avoid wiring the popover for "labels" — bolded tokens that are clearly
// headings/sentinels rather than glossary entries (e.g. "Function:", "1.6 ms").
function glossSkipShape(raw){
  const s=(raw||'').trim();
  if(!s) return true;
  if(s.length>60) return true;                       // too long, probably a sentence
  if(/^[-+\d]/.test(s)) return true;                 // starts with digit/sign — stats/values
  if(/^[A-Z]+:?$/.test(s) && s.length<=2) return true; // 1-2 char tokens unlikely
  return false;
}
function decorateGlossary(){
  if(!Object.keys(GLOSS).length) return;
  const root=view.querySelector('.art');if(!root) return;
  root.querySelectorAll('strong').forEach(s=>{
    if(s.classList.contains('gloss')) return;
    const raw=s.textContent;
    if(glossSkipShape(raw)) return;
    const hit=glossLookup(raw);
    if(!hit) return;
    s.classList.add('gloss');
    s.setAttribute('tabindex','0');
    s.setAttribute('role','button');
    s.setAttribute('aria-label','Definition of '+raw);
    s.dataset.gkey=hit.key;
    s.dataset.gterm=raw.replace(/[:.,;\s]+$/,'').trim();
  });
}

const glosspop=document.getElementById('glosspop');
let glossActive=null;
function showGloss(strong){
  const def=GLOSS[strong.dataset.gkey];
  if(!def) return;
  const term=strong.dataset.gterm||strong.textContent.trim();
  glosspop.innerHTML=
    '<div class="gp-head">'+
      '<div class="gp-term">'+escHTML(term)+'</div>'+
      '<button class="gp-x" aria-label="Close">✕</button>'+
    '</div>'+
    '<p class="gp-def">'+escHTML(def)+'</p>';
  glosspop.querySelector('.gp-x').onclick=hideGloss;
  // position: prefer just below the term; flip above if no room; clamp inside viewport.
  const r=strong.getBoundingClientRect();
  glosspop.style.left='0px';glosspop.style.top='0px';   // reset so we can measure
  glosspop.classList.add('show');
  const pad=10;
  const pw=glosspop.offsetWidth, ph=glosspop.offsetHeight;
  const vw=document.documentElement.clientWidth, vh=document.documentElement.clientHeight;
  let left=r.left, top=r.bottom+8;
  if(top+ph+pad>vh) top=Math.max(pad, r.top-ph-8);    // flip above if cramped
  if(left+pw+pad>vw) left=vw-pw-pad;
  if(left<pad) left=pad;
  glosspop.style.left=left+'px';glosspop.style.top=top+'px';
  if(glossActive) glossActive.classList.remove('on');
  glossActive=strong; strong.classList.add('on');
}
function hideGloss(){
  glosspop.classList.remove('show');
  if(glossActive){glossActive.classList.remove('on');glossActive=null;}
}
function escHTML(s){return (s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c]);}

// open on click of a glossed strong; close on click outside or Esc; reposition on scroll/resize
document.addEventListener('click',e=>{
  const t=e.target.closest('strong.gloss');
  if(t){
    e.preventDefault();
    if(glossActive===t){hideGloss();return;}
    showGloss(t);return;
  }
  if(glosspop.classList.contains('show') && !e.target.closest('#glosspop')) hideGloss();
},true);
document.addEventListener('keydown',e=>{
  if(e.key==='Escape' && glosspop.classList.contains('show')) hideGloss();
  // also let Enter / Space on a focused strong.gloss open it (keyboard a11y)
  if((e.key==='Enter'||e.key===' ') && document.activeElement && document.activeElement.classList && document.activeElement.classList.contains('gloss')){
    e.preventDefault();showGloss(document.activeElement);
  }
});
main.addEventListener('scroll',()=>{if(glosspop.classList.contains('show')) hideGloss();},{passive:true});
window.addEventListener('resize',hideGloss);

// ---- on-this-page outline ----
let tocLinks=[];
function buildTOC(){
  const toc=document.getElementById('toc');tocLinks=[];
  if(!toc)return;
  const hs=[...view.querySelectorAll('.art h2')];
  if(hs.length<3){toc.innerHTML='';view.classList.remove('has-toc');return;}
  view.classList.add('has-toc');
  const head=document.createElement('div');head.className='toc-h';head.textContent='On this page';
  toc.innerHTML='';toc.appendChild(head);
  hs.forEach((h,idx)=>{
    if(!h.id)h.id='s'+idx;
    const a=document.createElement('a');a.dataset.id=h.id;a.textContent=h.textContent;
    a.onclick=e=>{e.preventDefault();const t=document.getElementById(a.dataset.id);if(t)main.scrollTo({top:t.offsetTop-20,behavior:'smooth'});};
    toc.appendChild(a);
  });
  tocLinks=[...toc.querySelectorAll('a')];
  syncTOC();
}
function syncTOC(){
  if(!tocLinks.length)return;
  const y=main.scrollTop+96;let active=tocLinks[0].dataset.id;
  tocLinks.forEach(a=>{const t=document.getElementById(a.dataset.id);if(t&&t.offsetTop<=y)active=a.dataset.id;});
  tocLinks.forEach(a=>a.classList.toggle('on',a.dataset.id===active));
}

// reading progress
main.addEventListener('scroll',()=>{
  if(!current){progress.style.width='0';return;}
  const max=main.scrollHeight-main.clientHeight;
  progress.style.width=(max>0?Math.min(100,main.scrollTop/max*100):0)+'%';
  syncTOC();
});

function runSearch(val){q.value=val;q2.value=val;renderNav();if(val.trim())openNav();}
q.addEventListener('input',()=>runSearch(q.value));
q2.addEventListener('input',()=>runSearch(q2.value));
// sync the document theme-color to the active theme on first paint
(function(){const mc=document.querySelector('meta[name="theme-color"]');if(mc)mc.setAttribute('content',curTheme()==='light'?'#f3efe6':'#14161c');})();
buildPills();renderNav();renderHome();
if('serviceWorker' in navigator){window.addEventListener('load',()=>navigator.serviceWorker.register('sw.js').catch(()=>{}));}

// ---- toast ----
let toastT;
function toast(html,ms=2600){
  const el=document.getElementById('toast');if(!el)return;
  el.innerHTML='<span class="dot"></span>'+html;el.classList.add('show');
  clearTimeout(toastT);toastT=setTimeout(()=>el.classList.remove('show'),ms);
}

// ---- force sync: wipe the service worker + caches, then reload fresh ----
let syncing=false;
async function forceSync(){
  if(syncing)return;syncing=true;
  document.querySelectorAll('.syncbtn').forEach(b=>b.classList.add('spin'));
  toast('Syncing to latest…',8000);
  try{
    if('serviceWorker' in navigator){
      const regs=await navigator.serviceWorker.getRegistrations();
      await Promise.all(regs.map(r=>r.unregister()));
    }
    if(window.caches){
      const keys=await caches.keys();
      await Promise.all(keys.map(k=>caches.delete(k)));
    }
  }catch(e){}
  try{sessionStorage.setItem('justSynced','1');}catch(e){}
  // cache-bust the document itself so we never get a stale HTML from the HTTP cache
  location.replace(location.pathname+'?s='+Date.now());
}
document.querySelectorAll('.syncbtn').forEach(b=>b.onclick=forceSync);

// confirm after the reload triggered by forceSync
try{
  if(sessionStorage.getItem('justSynced')){
    sessionStorage.removeItem('justSynced');
    const v=(DATA&&DATA.build)?' &middot; <b>'+DATA.build+'</b>':'';
    setTimeout(()=>toast('Synced to the latest version'+v),300);
    if(location.search) history.replaceState(null,'',location.pathname);
  }
}catch(e){}
</script></body></html>
